name: Deploy to Azure

# Test on PRs and pushes to main; deploy only after tests pass on a push to main.
on:
  push:
      branches:
          - main
  pull_request:
      branches:
          - main

# Set up permissions for deploying with secretless Azure federated credentials
# https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure?tabs=azure-portal%2Clinux#set-up-azure-login-with-openid-connect-authentication
permissions:
  id-token: write
  contents: read

jobs:
  # Compliance gate: the orchestrator gates + skills must stay green before any deploy.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies (test tooling + langgraph engine)
        working-directory: server
        run: uv sync --extra langgraph
      - name: Unit tests
        working-directory: server
        # --extra langgraph on every `uv run` so its re-sync keeps the graph engine
        # installed; scope to tests/ so scripts/ helper files aren't collected.
        run: uv run --extra langgraph python -m pytest tests/ -q
      - name: Compliance evals (fsm + langgraph engines)
        working-directory: server
        run: |
          uv run --extra langgraph python evals/run_text.py --all
          uv run --extra langgraph python evals/run_text.py --all --engine langgraph

  build_and_deploy:
    needs: test
    # Deploy only on a real push to main — never on pull requests.
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_VOICE_LIVE_MODEL: ${{ vars.AZURE_VOICE_LIVE_MODEL }}
      TELEPHONY_PROVIDER: ${{ vars.TELEPHONY_PROVIDER }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Log in with Azure CLI for preprovision hook
        if: ${{ env.AZURE_CLIENT_ID != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      
      # azd keeps a separate auth context from Azure CLI.
      - name: Log in with azd (Federated Credentials)
        if: ${{ env.AZURE_CLIENT_ID != '' }}
        run: |
          azd auth login `
            --client-id "$Env:AZURE_CLIENT_ID" `
            --federated-credential-provider "github" `
            --tenant-id "$Env:AZURE_TENANT_ID"
        shell: pwsh

      - name: Configure azd environment (model + telephony)
        shell: pwsh
        run: |
          # Write CI variables into azd's env file so the preprovision hook reads them
          # (the hook uses `azd env get-value`, which does NOT see OS env vars).
          azd env new "$Env:AZURE_ENV_NAME" --location "$Env:AZURE_LOCATION" --subscription "$Env:AZURE_SUBSCRIPTION_ID"
          if (-not [string]::IsNullOrWhiteSpace($Env:AZURE_VOICE_LIVE_MODEL)) { azd env set AZURE_VOICE_LIVE_MODEL "$Env:AZURE_VOICE_LIVE_MODEL" }
          if (-not [string]::IsNullOrWhiteSpace($Env:TELEPHONY_PROVIDER)) { azd env set TELEPHONY_PROVIDER "$Env:TELEPHONY_PROVIDER" }
          azd env get-values

      - name: Provision Infrastructure
        run: azd provision --no-prompt

      - name: Deploy Application
        run: azd deploy --no-prompt

      - name: Publish app URL to run summary
        if: success()
        continue-on-error: true
        shell: pwsh
        run: |
          $raw = azd env get-value SERVICE_API_ENDPOINTS 2>$null
          $webhook = [regex]::Match([string]$raw, 'https?://[^"\]\s,]+').Value
          if ([string]::IsNullOrWhiteSpace($webhook)) {
            "Could not determine app URL from azd env." | Out-File -FilePath $Env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
            return
          }
          $baseUrl = ([uri]$webhook).GetLeftPart([System.UriPartial]::Authority)
          $lines = @(
            "## 🚀 Voice Agent deployed",
            "",
            "| | |",
            "|---|---|",
            "| **Web client (live URL)** | $baseUrl |",
            "| **Telephony webhook** | ``$webhook`` |",
            "",
            "Open the web client URL in a browser and click **Start Talking to Agent**."
          )
          $lines | Out-File -FilePath $Env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          Write-Host "App URL: $baseUrl"