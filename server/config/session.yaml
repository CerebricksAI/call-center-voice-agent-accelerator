# Voice Live session tuning — the human-like knobs.
#
# STATUS: this file is the SPEC / target config. Today these values are applied
# through the existing env vars in app/voice_live_session.py (see the `env:` note
# on each). Phase 3 adds a typed loader that reads this file directly and overrides
# _session_config(). Until then, set the noted env vars to change live behavior.
#
# Fields map to azure.ai.voicelive.models (RequestSession, AzureSemanticVad,
# AzureStandardVoice, AudioInputTranscriptionOptions, ...). Do not invent fields —
# check the SDK before adding one.

model:
  # LLM sampling temperature — anti-hallucination. NOT the voice temperature.
  # ACTIVE now via env VOICE_LIVE_MODEL_TEMPERATURE (default 0.6). Range 0.0-1.0.
  temperature: 0.6
  # Short turns create natural openings for the caller to speak — a turn-taking
  # feature disguised as a cost cap. env VOICE_LIVE_MAX_RESPONSE_TOKENS.
  max_response_output_tokens: 400

voice:
  # env VOICE_NAME. DragonHD multilingual voice (100+ locales).
  name: en-US-Ava:DragonHDLatestNeural
  # Voice/TTS expressiveness (AzureStandardVoice.temperature). env VOICE_TEMPERATURE.
  temperature: 0.9

# Turn detection — the difference between "responsive" and "jumpy".
# Today driven by the latency presets + VOICE_LIVE_EOU_* / VOICE_LIVE_SILENCE_*
# env vars. interrupt_response + auto_truncate are already ON in code.
turn_detection:
  type: azure_semantic_vad
  threshold: 0.4
  prefix_padding_ms: 200
  silence_duration_ms: 600
  remove_filler_words: true      # "umm" won't trigger a barge-in
  interrupt_response: true       # server halts generation on real speech (ACTIVE)
  auto_truncate: true            # (ACTIVE)
  end_of_utterance_detection:
    model: semantic_detection_v1

# Caller transcription — REQUIRED for the compliance gates (Phase 3), which run on
# finalized transcripts. phrase_list biases STT toward compliance-critical terms.
input_audio_transcription:
  model: azure-speech
  phrase_list: [refinance, cash out, cash-out, HELOC, escrow, do not call, take me off]

# Audio pre-processing so a nearby TV doesn't produce phantom turns.
# env VOICE_LIVE_NOISE_REDUCTION / VOICE_LIVE_ECHO_CANCELLATION (ACTIVE).
input_audio_noise_reduction:
  type: azure_deep_noise_suppression
input_audio_echo_cancellation: {}

# Silence policy (Phase 3 — needs the FSM turn counter).
silence:
  reprompt_at_s: [8, 16]         # two VARIED reprompts, never "are you still there?" x3
  close_at_s: 25
  disposition: no_response
