<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Call History · Sales Agent</title>
  <link rel="icon" href="/static/sales-agent-logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="/static/settings-modal.js"></script>
  <style>
    :root,
    [data-theme="light"] {
      --font-sans: 'Inter', system-ui, sans-serif;
      --qt-black: #000000;
      --qt-primary: #8929fe;
      --qt-primary-hover: #7420db;
      --qt-heading: #002060;
      --qt-border: #dddddd;
      --bg-deep: #ffffff;
      --bg-main: #f5f7fa;
      --bg-panel: #ffffff;
      --bg-card: #ffffff;
      --bg-elevated: #f8fafc;
      --border: #dddddd;
      --border-subtle: #e8e8e8;
      --text-primary: #111111;
      --text-secondary: #5c6678;
      --text-muted: #767676;
      --nav-bg: #0c1222;
      --nav-accent: #a78bfa;
      --nav-border: rgba(255, 255, 255, 0.08);
      --nav-text: rgba(255, 255, 255, 0.92);
      --nav-text-muted: rgba(255, 255, 255, 0.72);
      --panel-shadow: 0 8px 32px rgba(17, 17, 17, 0.08);
      --radius-sm: 4px;
      --radius-md: 8px;
    }

    [data-theme="dark"] {
      --qt-primary: #8929fe;
      --qt-primary-hover: #7420db;
      --qt-heading: #ffffff;
      --bg-deep: #0c1222;
      --bg-main: #0e1628;
      --bg-panel: #152238;
      --bg-card: #152238;
      --bg-elevated: #1a2844;
      --border: rgba(255, 255, 255, 0.14);
      --border-subtle: rgba(255, 255, 255, 0.08);
      --text-primary: #f5f5f5;
      --text-secondary: #b0b8c4;
      --text-muted: #8b95a5;
      --panel-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }

    * {
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    *::-webkit-scrollbar {
      display: none;
      width: 0;
      height: 0;
    }

    body {
      margin: 0;
      font-family: var(--font-sans);
      background: var(--bg-deep);
      height: 100vh;
      overflow: hidden;
      color: var(--text-primary);
    }

    .app-nav {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 0 1.25rem;
      height: 58px;
      background: var(--nav-bg);
      color: var(--nav-text);
      border-bottom: 1px solid var(--nav-border);
      z-index: 100;
      overflow: hidden;
      position: relative;
    }

    .app-nav::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 35% 140% at 0% 50%, rgba(137, 41, 254, 0.16) 0%, transparent 72%);
      pointer-events: none;
    }

    .app-nav > * {
      position: relative;
      z-index: 1;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.65rem;
    }

    .nav-brand-icon {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      display: block;
      border-radius: 50%;
      object-fit: cover;
    }

    .nav-brand-text {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #ffffff;
      line-height: 1.2;
      white-space: nowrap;
    }

    .nav-brand-text .accent {
      color: var(--nav-accent);
      font-weight: 600;
      letter-spacing: 0;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      flex: 1;
    }

    .nav-link {
      padding: 0.42rem 0.85rem;
      border-radius: var(--radius-sm);
      font-size: 0.84rem;
      font-weight: 600;
      color: var(--nav-text-muted);
      text-decoration: none;
    }

    .nav-link.active {
      background: var(--qt-primary);
      color: #ffffff;
    }

    a.nav-link:not(.disabled):not(.active):hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--nav-text);
    }

    .nav-link.disabled {
      opacity: 0.35;
      pointer-events: none;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-left: auto;
    }

    .nav-user {
      font-size: 0.78rem;
      color: var(--nav-text-muted);
      max-width: 11rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .logout-btn, .theme-toggle {
      padding: 0.38rem 0.75rem;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--nav-text-muted);
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
    }

    .theme-toggle { padding: 0.38rem 0.55rem; }

    .history-layout {
      display: grid;
      grid-template-columns: 56px 1fr;
      height: calc(100vh - 58px);
      background: var(--bg-main);
      position: relative;
    }

    /* Past-calls rail: collapsed strip with icon, expands on hover. */
    .call-list-panel {
      border-right: 1px solid var(--border);
      background: var(--bg-elevated);
      display: flex;
      flex-direction: column;
      min-height: 0;
      width: 56px;
      overflow: hidden;
      position: relative;
      z-index: 30;
      transition: width 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
    }

    .call-list-panel:hover {
      width: 320px;
      background: var(--bg-panel);
      box-shadow: 6px 0 22px rgba(0, 0, 0, 0.18);
    }

    .call-list-header,
    .call-list {
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .call-list-panel:hover .call-list-header,
    .call-list-panel:hover .call-list {
      opacity: 1;
    }

    .call-list-rail {
      position: absolute;
      top: 0;
      left: 0;
      width: 56px;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem 0 1.25rem;
      pointer-events: none;
      transition: opacity 0.15s ease;
    }

    .call-list-rail::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--qt-primary);
      border-radius: 0 2px 2px 0;
      opacity: 0.85;
    }

    .call-list-panel:hover .call-list-rail {
      opacity: 0;
    }

    .rail-handle {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.45rem;
      text-align: center;
    }

    .rail-icon {
      width: 22px;
      height: 22px;
      color: var(--qt-primary);
      flex-shrink: 0;
    }

    .call-list-rail .rail-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.1rem;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      line-height: 1.15;
      color: var(--text-secondary);
    }

    .call-list-rail .rail-label span {
      display: block;
    }

    .rail-expand {
      margin-top: auto;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-muted);
      opacity: 0.45;
      line-height: 1;
    }

    .call-list-header {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--border-subtle);
      font-weight: 600;
      font-size: 0.92rem;
      color: var(--qt-heading);
      background: var(--bg-elevated);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .refresh-btn {
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.25rem 0.55rem;
      cursor: pointer;
    }

    .refresh-btn:hover { border-color: var(--qt-primary); color: var(--qt-primary); }

    .call-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
    }

    .call-list-item {
      width: 100%;
      text-align: left;
      border: 1px solid var(--border-subtle);
      background: var(--bg-card);
      border-radius: var(--radius-md);
      padding: 0.75rem;
      margin-bottom: 0.5rem;
      cursor: pointer;
      font-family: inherit;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .call-list-item:hover {
      border-color: var(--qt-primary);
    }

    .call-list-item.selected {
      border-color: var(--qt-primary);
      box-shadow: 0 0 0 1px var(--qt-primary);
    }

    .call-list-item .when {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }

    .call-list-item .meta {
      font-size: 0.72rem;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .call-detail {
      min-height: 0;
      overflow-y: auto;
      padding: 1rem;
    }

    .empty-state, .loading-state, .error-state {
      margin: 3rem auto;
      max-width: 28rem;
      text-align: center;
      color: var(--text-muted);
      line-height: 1.5;
      font-size: 0.92rem;
    }

    .error-state { color: #dc2626; }

    .page-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.85rem;
      padding: 2rem 1rem;
      min-height: 140px;
      color: var(--text-muted);
      font-size: 0.86rem;
      font-weight: 500;
      text-align: center;
    }

    .page-loading.detail {
      min-height: 360px;
    }

    .loading-ring {
      width: 46px;
      height: 46px;
      border: 3px solid var(--border);
      border-top-color: var(--qt-primary);
      border-right-color: rgba(137, 41, 254, 0.35);
      border-radius: 50%;
      animation: loading-spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes loading-spin {
      to { transform: rotate(360deg); }
    }

    .refresh-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .detail-meta {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 1rem 1.5rem;
      padding: 0.85rem 1rem;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      margin-bottom: 1rem;
      font-size: 0.8rem;
    }

    .detail-meta > div {
      min-width: 0;
    }

    .detail-meta dt {
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      font-size: 0.68rem;
    }

    .detail-meta dd {
      margin: 0.15rem 0 0;
      font-weight: 600;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
      overflow-wrap: anywhere;
      line-height: 1.35;
    }

    @media (max-width: 1200px) {
      .detail-meta {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 768px) {
      .detail-meta {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 280px;
      gap: 1rem;
      min-height: 320px;
      margin-bottom: 1rem;
    }

    .panel {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--panel-shadow);
      display: flex;
      flex-direction: column;
      min-height: 280px;
      max-height: 420px;
      overflow: hidden;
    }

    .panel-header {
      padding: 0.65rem 1rem;
      border-bottom: 1px solid var(--border-subtle);
      font-weight: 600;
      font-size: 0.92rem;
      color: var(--qt-heading);
      background: var(--bg-elevated);
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 0.85rem 1rem;
    }

    .transcript-log {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .transcript-bubble {
      max-width: 90%;
      padding: 0.6rem 0.8rem;
      border-radius: 0.75rem;
      font-size: 0.9rem;
      line-height: 1.45;
      word-wrap: break-word;
    }

    .transcript-bubble.user {
      align-self: flex-end;
      background: var(--qt-primary);
      color: #fff;
    }

    .transcript-bubble.assistant {
      align-self: flex-start;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
    }

    .transcript-label {
      display: block;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.2rem;
      opacity: 0.85;
    }

    .kd-meta-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.65rem;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .fields-status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--qt-primary);
      flex-shrink: 0;
    }

    .fields-capture-badge {
      padding: 0.15rem 0.45rem;
      border-radius: 999px;
      background: rgba(137, 41, 254, 0.15);
      color: var(--qt-primary);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .kd-form {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .kd-section {
      padding: 0.85rem 0 0.65rem;
      border-bottom: 1px solid var(--border-subtle);
    }

    .kd-section:last-of-type {
      border-bottom: none;
    }

    .kd-section-title {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.65rem;
    }

    .kd-grid {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .kd-field {
      min-width: 0;
      padding: 0.7rem 0.85rem;
      border-radius: var(--radius-md, 8px);
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
    }

    .kd-field-head {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.45rem;
    }

    .kd-field-icon {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      color: var(--qt-primary);
      opacity: 0.85;
    }

    .kd-field-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .kd-field-value {
      font-size: 0.9rem;
      font-weight: 600;
      line-height: 1.45;
      color: var(--text-primary);
      word-wrap: break-word;
      font-style: normal;
    }

    .kd-field-value.muted { color: var(--text-muted); font-weight: 500; font-style: italic; }
    .kd-field-value.captured { color: var(--text-primary); }
    .kd-field-value.high { color: #15803d; }
    .kd-field-value.mid { color: #b45309; }
    .kd-field-value.low { color: #dc2626; }

    .kd-field-value + .kd-bar-row {
      margin-top: 0.45rem;
    }

    .kd-bar-row {
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }

    .kd-bar-track {
      flex: 1;
      height: 4px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    [data-theme="dark"] .kd-bar-track {
      background: rgba(255, 255, 255, 0.08);
    }

    .kd-bar-fill {
      height: 100%;
      border-radius: 999px;
    }

    .kd-bar-fill.high { background: #22c55e; }
    .kd-bar-fill.mid { background: #f59e0b; }
    .kd-bar-fill.low { background: #ef4444; }
    .kd-bar-fill.none { background: transparent; width: 0 !important; }

    .kd-bar-pct {
      font-size: 0.68rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--text-muted);
      min-width: 2.2rem;
      text-align: right;
    }

    .panel-key-details .panel-body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 0;
      min-height: 0;
    }

    .kd-panel-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0.85rem 1rem;
    }

    .kd-panel-legend {
      flex-shrink: 0;
      border-top: 1px solid var(--border-subtle);
      background: var(--bg-panel);
      padding: 0.55rem 1rem 0.65rem;
      box-shadow: 0 -4px 12px rgba(15, 23, 42, 0.05);
    }

    .kd-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem 1rem;
      padding: 0;
      margin: 0;
      border: none;
      font-size: 0.68rem;
      color: var(--text-muted);
    }

    .kd-legend-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .kd-legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .kd-legend-dot.high { background: #22c55e; }
    .kd-legend-dot.mid { background: #f59e0b; }
    .kd-legend-dot.low { background: #ef4444; }
    .kd-legend-dot.none { background: var(--text-muted); opacity: 0.45; }

    .metrics-cost-note {
      margin-top: 0.65rem;
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .summary-block {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border-subtle);
    }

    .summary-block h4 {
      margin: 0 0 0.65rem;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .summary-block p {
      margin: 0 0 0.65rem;
      font-size: 0.88rem;
      line-height: 1.55;
      color: var(--text-secondary);
    }

    .metric-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0.55rem 0.65rem;
      margin-bottom: 0.5rem;
    }

    .metric-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-secondary);
      font-weight: 600;
    }

    .metric-value {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--qt-primary);
      margin-top: 0.2rem;
      font-variant-numeric: tabular-nums;
    }

    .metric-sub {
      font-size: 0.68rem;
      color: var(--text-muted);
      margin-top: 0.15rem;
    }

    .cost-cell {
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .cost-breakdown {
      display: grid;
      grid-template-columns: minmax(260px, 380px) 1fr;
      gap: 1.25rem 2.5rem;
      align-items: stretch;
      max-width: none;
    }

    .cost-breakdown-items {
      display: grid;
      gap: 0.45rem;
      align-content: start;
    }

    .cost-breakdown-summary {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.6rem;
      padding-left: 2rem;
      border-left: 1px solid var(--border-subtle);
    }

    .cost-total-label {
      font-size: 0.74rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .cost-total-value {
      font-size: 1.9rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--qt-primary);
      line-height: 1.1;
    }

    .cost-breakdown-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
      font-size: 0.84rem;
    }

    .cost-breakdown-row .label {
      color: var(--text-secondary);
    }

    .cost-breakdown-row .value {
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--text-primary);
    }

    .cost-breakdown-row.total {
      margin-top: 0.35rem;
      padding-top: 0.55rem;
      border-top: 1px solid var(--border);
      font-size: 0.92rem;
    }

    .cost-breakdown-row.total .label,
    .cost-breakdown-row.total .value {
      font-weight: 700;
      color: var(--qt-primary);
    }

    .cost-breakdown-note {
      margin-top: 0.35rem;
      font-size: 0.68rem;
      color: var(--text-muted);
      line-height: 1.45;
    }

    .section-panel {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      margin-bottom: 1rem;
      overflow: hidden;
    }

    .section-panel .panel-header {
      cursor: pointer;
      user-select: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .section-panel .panel-body.collapsed { display: none; }

    .turn-table-wrap, .events-table-wrap {
      overflow-x: auto;
    }

    table.data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.78rem;
    }

    table.data-table th,
    table.data-table td {
      padding: 0.45rem 0.55rem;
      border-bottom: 1px solid var(--border-subtle);
      text-align: left;
      white-space: nowrap;
    }

    table.data-table th {
      background: var(--bg-elevated);
      color: var(--text-secondary);
      font-weight: 600;
      position: sticky;
      top: 0;
    }

    table.data-table tr.timeline-bookend td {
      background: color-mix(in srgb, var(--accent) 8%, transparent);
      font-weight: 600;
    }

    table.data-table tr.timeline-wrap td {
      background: color-mix(in srgb, var(--accent) 4%, transparent);
      font-style: italic;
      color: var(--text-secondary);
    }

    table.data-table tr.timeline-gap td {
      background: var(--bg-elevated);
      color: var(--text-muted);
      font-size: 0.72rem;
      line-height: 1.45;
      white-space: normal;
    }

    .timeline-note {
      margin: 0.65rem 0 0;
      font-size: 0.72rem;
      line-height: 1.45;
      color: var(--text-muted);
    }

    @media (max-width: 1100px) {
      .history-layout { grid-template-columns: 1fr; grid-template-rows: 240px 1fr; }
      .call-list-panel {
        border-right: none;
        border-bottom: 1px solid var(--border);
        width: auto;
        overflow: auto;
        box-shadow: none;
        z-index: auto;
      }
      .call-list-panel:hover { width: auto; box-shadow: none; }
      .call-list-header, .call-list { opacity: 1; }
      .call-list-rail { display: none; }
      .detail-grid { grid-template-columns: 1fr; }
      .panel { max-height: none; }
      .cost-breakdown { grid-template-columns: 1fr; gap: 1rem; }
      .cost-breakdown-summary {
        border-left: none;
        padding-left: 0;
        border-top: 1px solid var(--border-subtle);
        padding-top: 0.85rem;
      }
    }
  </style>
</head>
<body>
  <nav class="app-nav">
    <div class="nav-brand">
      <img class="nav-brand-icon" src="/static/sales-agent-logo.png" alt="" width="36" height="36">
      <span class="nav-brand-text">Sales <span class="accent">Agent</span></span>
    </div>
    <div class="nav-links">
      <a class="nav-link" href="/">Pre-Qual Call</a>
      <a class="nav-link active" href="/history">Call History</a>
      <a class="nav-link" href="/analytics">Analytics</a>
      <a class="nav-link" href="#" id="navSettings" onclick="openSettings(event)">Settings</a>
    </div>
    <div class="nav-right">
      <button type="button" class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">☾</button>
      <span class="nav-user" id="navUser"></span>
      <button type="button" class="logout-btn" onclick="logout()">Sign out</button>
    </div>
  </nav>

  <div class="history-layout">
    <aside class="call-list-panel" title="Hover to browse past calls">
      <div class="call-list-rail" aria-hidden="true">
        <div class="rail-handle">
          <svg class="rail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
            <path d="M12 8v4l3 2"/>
            <circle cx="12" cy="12" r="9"/>
          </svg>
          <div class="rail-label"><span>Past</span><span>calls</span></div>
        </div>
        <span class="rail-expand" aria-hidden="true">›</span>
      </div>
      <div class="call-list-header">
        <span>Past calls</span>
        <button type="button" class="refresh-btn" onclick="loadCallList()">Refresh</button>
      </div>
      <div id="callList" class="call-list">
        <div class="page-loading" role="status" aria-live="polite">
          <div class="loading-ring" aria-hidden="true"></div>
          <span>Loading call history…</span>
        </div>
      </div>
    </aside>

    <main id="callDetail" class="call-detail">
      <div class="empty-state">Select a call to view the full record.</div>
    </main>
  </div>

  <script>
    let selectedCallId = null;
    let sessionCheckTimer = null;

    function toggleTheme() {
      const html = document.documentElement;
      const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
      html.setAttribute("data-theme", next);
      localStorage.setItem("qt-theme", next);
      document.getElementById("themeToggle").textContent = next === "dark" ? "☀" : "☾";
    }

    function applySavedTheme() {
      const saved = localStorage.getItem("qt-theme") || "light";
      document.documentElement.setAttribute("data-theme", saved);
      document.getElementById("themeToggle").textContent = saved === "dark" ? "☀" : "☾";
    }

    async function ensureAuthenticated() {
      try {
        const res = await fetch("/auth/session", { credentials: "same-origin" });
        if (!res.ok) {
          window.location.replace("/login");
          return false;
        }
        const data = await res.json();
        const navUser = document.getElementById("navUser");
        if (navUser && data.email) navUser.textContent = data.email;
        return true;
      } catch (_) {
        window.location.replace("/login");
        return false;
      }
    }

    async function logout() {
      let logoutUrl = null;
      try {
        const res = await fetch("/auth/logout", { method: "POST", credentials: "same-origin" });
        const data = await res.json().catch(() => ({}));
        logoutUrl = data.logoutUrl || null;
      } catch (_) {}
      window.location.replace(logoutUrl || "/login");
    }

    function fmtDate(iso) {
      if (!iso) return "—";
      try {
        return new Date(iso).toLocaleString(undefined, {
          dateStyle: "medium",
          timeStyle: "short",
        });
      } catch (_) {
        return iso;
      }
    }

    const FMT_DECIMALS = 3;

    function fmtDecimal(n, places = FMT_DECIMALS) {
      if (n == null || n === "" || Number.isNaN(Number(n))) return "—";
      return parseFloat(Number(n).toFixed(places)).toString();
    }

    function fmtDuration(sec) {
      if (sec == null || Number.isNaN(Number(sec))) return "—";
      const s = Number(sec);
      const m = Math.floor(s / 60);
      const r = s - m * 60;
      return m > 0 ? `${m}m ${fmtDecimal(r, FMT_DECIMALS)}s` : `${fmtDecimal(s, FMT_DECIMALS)}s`;
    }

    function fmtMs(v) {
      if (v == null || v === "" || Number(v) < 0) return "—";
      const n = Number(v);
      if (n >= 1000) return fmtDecimal(n / 1000, FMT_DECIMALS) + "s";
      return fmtDecimal(n, FMT_DECIMALS) + "ms";
    }

    function fmtTimelineAt(ms) {
      if (ms == null || isNaN(ms)) return "—";
      const totalMs = Math.max(0, Number(ms));
      const hours = Math.floor(totalMs / 3600000);
      const minutes = Math.floor((totalMs % 3600000) / 60000);
      const seconds = Math.floor((totalMs % 60000) / 1000);
      const millis = totalMs % 1000;
      const pad2 = (n) => String(n).padStart(2, "0");
      return `${pad2(hours)}:${pad2(minutes)}:${pad2(seconds)}:${fmtDecimal(millis, FMT_DECIMALS)}`;
    }

    function callStats(call) {
      const messages =
        call && call.messageCount != null
          ? Number(call.messageCount)
          : call && call.turnCount != null
            ? Number(call.turnCount)
            : call && Array.isArray(call.transcript)
              ? call.transcript.length
              : null;
      const userTurns =
        call && call.userTurnCount != null
          ? Number(call.userTurnCount)
          : null;
      const agentResponses =
        call && call.agentResponseCount != null
          ? Number(call.agentResponseCount)
          : call && Array.isArray(call.metrics)
            ? call.metrics.length
            : null;
      return {
        messages: messages != null && !Number.isNaN(messages) ? messages : null,
        userTurns: userTurns != null && !Number.isNaN(userTurns) ? userTurns : null,
        agentResponses:
          agentResponses != null && !Number.isNaN(agentResponses) ? agentResponses : null,
      };
    }

    function fmtCallListMeta(call) {
      const { messages, userTurns } = callStats(call);
      const parts = [fmtDuration(call.durationSec)];
      if (userTurns != null) parts.push(`${userTurns} user turn${userTurns === 1 ? "" : "s"}`);
      if (messages != null) parts.push(`${messages} message${messages === 1 ? "" : "s"}`);
      parts.push(call.channel || "web");
      if (call.model) parts.push(call.model);
      return parts.join(" · ");
    }

    function fmtDurationMs(ms) {
      if (ms == null || Number.isNaN(Number(ms))) return "—";
      return fmtDuration(Number(ms) / 1000);
    }

    const TIMELINE_EVENT_LABELS = {
      call_started: "Call started",
      call_ended: "Call ended",
      end_call_requested: "End call requested",
      summary_started: "Summary generation started",
      summary_done: "Summary generation finished",
      session_closing: "Voice session closing",
      speech_started: "Caller started speaking",
      speech_stopped: "Caller stopped speaking",
      stt_done: "Speech-to-text finished",
      response_created: "Agent response started",
      first_audio: "First agent audio",
      audio_done: "Agent audio finished",
      response_done: "Agent response finished",
    };

    const WRAP_UP_EVENTS = new Set([
      "end_call_requested",
      "summary_started",
      "summary_done",
      "session_closing",
    ]);

    function timelineEventLabel(name) {
      return TIMELINE_EVENT_LABELS[name] || name || "";
    }

    function insertTimelineGapRows(events) {
      if (!events || !events.length) return [];
      const rows = [];
      for (let i = 0; i < events.length; i++) {
        const ev = events[i];
        rows.push(ev);
        const next = events[i + 1];
        if (!next || ev.synthetic || next.synthetic) continue;
        const fromMs = ev.atMs != null ? Number(ev.atMs) : null;
        const toMs = next.atMs != null ? Number(next.atMs) : null;
        if (fromMs == null || toMs == null || toMs <= fromMs) continue;
        const gapMs = toMs - fromMs;
        if (gapMs < 2000) continue;

        const afterVoice =
          ev.event === "response_done" || ev.event === "audio_done";
        const beforeEnd =
          next.event === "call_ended" ||
          WRAP_UP_EVENTS.has(next.event) ||
          next.event === "end_call_requested";
        const wrapBetween = events
          .slice(i + 1, events.indexOf(next))
          .some((e) => WRAP_UP_EVENTS.has(e.event));

        if (afterVoice && beforeEnd && !wrapBetween && next.event === "call_ended") {
          rows.push({
            synthetic: true,
            event: "gap",
            gapMs,
            gapFromMs: fromMs,
            gapToMs: toMs,
          });
        }
      }
      return rows;
    }

    function describeTimelineGap(gapMs) {
      const duration = fmtDurationMs(gapMs);
      return `Unlogged period · ${duration} · Time on the line after the last agent reply (silence / caller listening), then end-call, summary generation, and save. Voice pipeline events are not recorded during this period.`;
    }

    function timelineNote(call, events) {
      const durationMs =
        call && call.durationSec != null ? Number(call.durationSec) * 1000 : null;
      const voiceEvents = (events || []).filter(
        (e) =>
          e &&
          !e.synthetic &&
          e.event !== "call_started" &&
          e.event !== "call_ended" &&
          !WRAP_UP_EVENTS.has(e.event)
      );
      const lastVoiceMs = voiceEvents.length
        ? Math.max(
            ...voiceEvents
              .map((e) => (e.atMs != null ? Number(e.atMs) : null))
              .filter((v) => v != null && !Number.isNaN(v))
          )
        : null;
      const parts = [
        "Call elapsed runs from connect to save. Voice events (speech, STT, agent audio) only cover active conversation.",
      ];
      if (lastVoiceMs != null && durationMs != null && durationMs - lastVoiceMs >= 2000) {
        parts.push(
          `After the last agent response (${fmtTimelineAt(lastVoiceMs)}), ${fmtDurationMs(durationMs - lastVoiceMs)} was spent off the voice pipeline before call ended (${fmtTimelineAt(durationMs)}).`
        );
      } else if (durationMs != null) {
        parts.push(`Total duration: ${fmtDuration(call.durationSec)}.`);
      }
      return parts.join(" ");
    }

    function avgMetric(rows, key) {
      const vals = rows
        .map((r) => (r.metrics || {})[key])
        .filter((v) => v != null && Number(v) >= 0);
      if (!vals.length) return null;
      return vals.reduce((a, b) => a + Number(b), 0) / vals.length;
    }

    function deriveFirstAudioMs(m) {
      if (!m) return null;
      if (m.firstAudioMs != null) return Number(m.firstAudioMs);
      const stt = m.sttMs, think = m.thinkMs, ts = m.ttsStartMs;
      if (stt != null && think != null && ts != null) return Number(stt) + Number(think) + Number(ts);
      const ttfa = m.ttfaMs;
      if (stt != null && ttfa != null) return Number(stt) + Number(ttfa);
      return ttfa != null ? Number(ttfa) : null;
    }

    function deriveE2eResponseMs(m) {
      if (!m) return null;
      if (m.e2eResponseMs != null) return Number(m.e2eResponseMs);
      const fa = deriveFirstAudioMs(m), tts = m.ttsMs;
      if (fa != null && tts != null) return fa + Number(tts);
      const stt = m.sttMs, think = m.thinkMs, ts = m.ttsStartMs;
      if (stt != null && think != null && ts != null && tts != null) {
        return Number(stt) + Number(think) + Number(ts) + Number(tts);
      }
      const resp = m.responseMs;
      if (stt != null && think != null && resp != null) return Number(stt) + Number(think) + Number(resp);
      if (stt != null && resp != null) return Number(stt) + Number(resp);
      return resp != null ? Number(resp) : null;
    }

    function avgDerived(rows, fn) {
      const vals = rows.map((r) => fn(r.metrics || {})).filter((v) => v != null && Number(v) >= 0);
      if (!vals.length) return null;
      return vals.reduce((a, b) => a + Number(b), 0) / vals.length;
    }

    function fmtCostUsd(v) {
      if (v == null || Number.isNaN(Number(v))) return "—";
      return "$" + Number(v).toFixed(FMT_DECIMALS);
    }

    function rowVoiceCostUsd(row) {
      const c = row.cost && row.cost.usd != null ? Number(row.cost.usd) : 0;
      return Number.isNaN(c) ? 0 : c;
    }

    function rowExtractCostUsd(row) {
      const c = row.extractCost && row.extractCost.usd != null ? Number(row.extractCost.usd) : 0;
      return Number.isNaN(c) ? 0 : c;
    }

    function rowTtsCostUsd(row) {
      const c = row.ttsCost && row.ttsCost.usd != null ? Number(row.ttsCost.usd) : 0;
      return Number.isNaN(c) ? 0 : c;
    }

    function rowTurnCostUsd(row) {
      const sum = rowVoiceCostUsd(row) + rowTtsCostUsd(row) + rowExtractCostUsd(row);
      return sum > 0 ? sum : null;
    }

    function avgTokensPerSec(rows) {
      const vals = rows
        .map((r) => r.tokensPerSec)
        .filter((v) => v != null && Number(v) >= 0);
      if (!vals.length) return null;
      return vals.reduce((a, b) => a + Number(b), 0) / vals.length;
    }

    function avgOutputTokens(rows) {
      const vals = rows
        .map((r) => (r.tokens || {}).output)
        .filter((v) => v != null && Number(v) >= 0);
      if (!vals.length) return null;
      return vals.reduce((a, b) => a + Number(b), 0) / vals.length;
    }

    function sumMetricTokens(metrics) {
      let input = 0;
      let output = 0;
      for (const row of metrics || []) {
        const tk = row.tokens || {};
        if (tk.input != null) input += Number(tk.input) || 0;
        if (tk.output != null) output += Number(tk.output) || 0;
      }
      return { input, output };
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function renderCallListItem(call) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "call-list-item" + (call.id === selectedCallId ? " selected" : "");
      btn.dataset.callId = call.id || call.callId;
      btn.innerHTML = `
        <div class="when">${escapeHtml(fmtDate(call.endedAt || call.startedAt))}</div>
        <div class="meta">${escapeHtml(fmtCallListMeta(call))}</div>
      `;
      btn.addEventListener("click", () => loadCallDetail(btn.dataset.callId));
      return btn;
    }

    function loadingPanel(message, variant) {
      const extra = variant ? ` ${variant}` : "";
      return `<div class="page-loading${extra}" role="status" aria-live="polite">
        <div class="loading-ring" aria-hidden="true"></div>
        <span>${message}</span>
      </div>`;
    }

    async function loadCallList() {
      const listEl = document.getElementById("callList");
      const refreshBtn = document.querySelector(".refresh-btn");
      if (refreshBtn) refreshBtn.disabled = true;
      listEl.innerHTML = loadingPanel("Loading call history…");

      try {
        const res = await fetch("/api/calls?limit=50", { credentials: "same-origin" });
        if (res.status === 401) {
          window.location.replace("/login");
          return;
        }
        const data = await res.json();
        if (!data.enabled) {
          listEl.innerHTML = `<div class="empty-state">${escapeHtml(data.message || "Call history is not configured.")}</div>`;
          document.getElementById("callDetail").innerHTML =
            `<div class="empty-state">${escapeHtml(data.message || "Configure COSMOS_ENDPOINT to enable call history.")}</div>`;
          return;
        }

        const calls = data.calls || [];
        if (!calls.length) {
          listEl.innerHTML = '<div class="empty-state">No saved calls yet. Complete a call on the Pre-Qual page to see it here.</div>';
          return;
        }

        listEl.innerHTML = "";
        for (const call of calls) {
          listEl.appendChild(renderCallListItem(call));
        }

        const storedId = sessionStorage.getItem("qt-open-call-id");
        if (storedId) {
          sessionStorage.removeItem("qt-open-call-id");
          await loadCallDetail(storedId, { pushState: true });
          return;
        }

        const urlId = new URLSearchParams(window.location.search).get("id");
        if (urlId) {
          await loadCallDetail(urlId, { pushState: false });
        } else if (!selectedCallId && calls[0]) {
          await loadCallDetail(calls[0].id || calls[0].callId, { pushState: false });
        }
      } catch (err) {
        listEl.innerHTML = `<div class="error-state">Failed to load calls: ${escapeHtml(err.message)}</div>`;
      } finally {
        if (refreshBtn) refreshBtn.disabled = false;
      }
    }

    function renderTranscript(transcript) {
      if (!transcript || !transcript.length) {
        return '<div class="empty-state" style="margin:1rem 0">No transcript saved.</div>';
      }
      return transcript
        .map((turn) => {
          const role = turn.role === "user" ? "user" : "assistant";
          const label = role === "user" ? "Caller" : "Agent";
          return `<div class="transcript-bubble ${role}">
            <span class="transcript-label">${label}</span>
            ${escapeHtml(turn.text || "")}
          </div>`;
        })
        .join("");
    }

    const INSIGHT_KEY_LABELS = {
      loan_purpose: "Loan purpose",
      loan_type: "Loan type",
      location: "State",
      state: "State",
      zip: "ZIP code",
      zip_status: "ZIP status",
      timeline: "Timeline",
      purchase_timeline: "Purchase timeline",
      amount: "Amount",
      cash_out_amount: "Cash-out amount",
      current_balance: "Current balance",
      down_payment: "Down payment",
      credit_score: "Credit score",
      employment: "Employment status",
      employment_status: "Employment status",
      income: "Annual income",
      annual_income: "Annual income",
      contact: "Contact preference",
      contact_preference: "Contact preference",
      consent: "TCPA consent",
      tcpa_consent: "TCPA consent",
      recording_consent: "Call recording consent",
      property_status: "Property type",
      property_type: "Property type",
      next_step: "Next step",
      rate: "Current rate",
      current_rate: "Current rate",
      lender: "Lender",
      other: "Other",
    };

    // Dynamic icon selection: keys are produced live by the extractor and can be
    // anything, so match meaningful keywords in the key + label rather than a
    // fixed key list. First matching rule wins; order = most specific first.
    const ICON_RULES = [
      { icon: "shield",    re: /consent|agree|permission|authoriz|\bopt[\s-]?(?:in|out)|disclosure|\bterms\b/ },
      { icon: "mic",       re: /record/ },
      { icon: "clock",     re: /\btime\b|timeline|duration|\beta\b|how\s*soon|urgen|availab|hours?/ },
      { icon: "calendar",  re: /\bdate\b|\bday\b|deadline|appointment|schedul|\bweek|\bmonth|\byear|tomorrow/ },
      { icon: "target",    re: /purpose|reason|goal|intent|objective|\bwhy\b|motiv|inquir|\bissue\b|problem|concern|request|topic|subject/ },
      { icon: "money",     re: /income|salary|wage|amount|price|cost|budget|payment|balance|\bloan\b|cash|\bfee\b|deposit|premium|refund|revenue|\bpay\b|dollar|\$|\bfund|financ|invoice|quote/ },
      { icon: "gauge",     re: /score|credit|rating|\brank|\blevel\b|grade|\bgpa\b/ },
      { icon: "mail",      re: /e[\s-]?mail/ },
      { icon: "phone",     re: /phone|\bcall\b|mobile|\bcell\b|telephone|whatsapp|\bsms\b|\btext\b|\bfax\b|contact/ },
      { icon: "pin",       re: /location|address|\bstate\b|\bcity\b|region|country|\bzip\b|postal|province|county|\barea\b|where|street/ },
      { icon: "home",      re: /propert|\bhome\b|house|real\s*estate|building|apartment|\bcondo\b|mortgage|\brent\b|residence/ },
      { icon: "hash",      re: /\bid\b|\bcode\b|number|account|reference|policy|\bssn\b|confirmation|ticket/ },
      { icon: "briefcase", re: /employ|\bjob\b|\bwork\b|occupation|profession|\bcompany\b|employer|business|industry/ },
      { icon: "user",      re: /\bname\b|person|applicant|borrower|customer|\bcaller\b|\bage\b|gender|dependent|household|family|party/ },
    ];

    function iconForKey(key, label) {
      const text = ((key || "") + " " + (label || "")).toLowerCase().replace(/_/g, " ");
      for (const rule of ICON_RULES) {
        if (rule.re.test(text)) return rule.icon;
      }
      return "doc";
    }

    const FIELD_ICON_SVG = {
      shield: '<svg class="kd-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l8 3v6c0 5-3.5 8.5-8 9-4.5-.5-8-4-8-9V6l8-3z"/></svg>',
      mic: '<svg class="kd-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 1 0-6 0v6a3 3 0 0 0 3 3z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><path d="M12 18v3"/></svg>',
      doc: '<svg class="kd-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>',
      pin: '<svg class="kd-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s7-4.5 7-11a7 7 0 1 0-14 0c0 6.5 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>',
      home: '<svg class="kd-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 10.5L12 4l8 6.5V20a1 1 0 0 1-1 1h-5v-6H10v6H5a1 1 0 0 1-1-1v-9.5z"/></svg>',
      clock: '<svg class="kd-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
      user: '<svg class="kd-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="3.5"/><path d="M5 20a7 7 0 0 1 14 0"/></svg>',
      money: '<svg class="kd-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="2" x2="12" y2="22"/><path d="M16 6a4 3 0 0 0-4-2C9.8 4 8 5.3 8 7s1.8 3 4 3.5 4 1.8 4 3.5-1.8 3-4 3a4 3 0 0 1-4-2"/></svg>',
      gauge: '<svg class="kd-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.5 16a9 9 0 1 0-17 0"/><path d="M12 13l4-4"/><circle cx="12" cy="13" r="1"/></svg>',
      target: '<svg class="kd-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5"/></svg>',
      phone: '<svg class="kd-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3h3l2 5-2.5 1.5a12 12 0 0 0 5 5L15 12l5 2v3a2 2 0 0 1-2.2 2A16 16 0 0 1 4 5.2 2 2 0 0 1 6 3z"/></svg>',
      mail: '<svg class="kd-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3.5 6.5l8.5 6 8.5-6"/></svg>',
      calendar: '<svg class="kd-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4.5" width="18" height="16" rx="2"/><path d="M3 9.5h18M8 2.5v4M16 2.5v4"/></svg>',
      hash: '<svg class="kd-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3L7 21M17 3l-2 18M4 9h17M3 15h17"/></svg>',
      briefcase: '<svg class="kd-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="7.5" width="18" height="12" rx="2"/><path d="M8 7.5V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v1.5M3 13h18"/></svg>',
    };

    function stripCallerPrefix(value) {
      return String(value || "")
        .replace(
          /^(?:The caller|Caller)(?:\s+is|\s+was|'s|\s+has|\s+had|\s+mentioned|\s+said|\s+confirmed|\s+looking)?\s+/i,
          ""
        )
        .trim();
    }

    function formatInsightValue(value) {
      let v = stripCallerPrefix(value);
      for (let i = 0; i < 3; i++) {
        const next = v
          .replace(
            /^(?:looking(?:\s+(?:to|in|at|for))?|considering(?:\s+a)?|currently|plans?\s+to|they(?:'re| are)|in the state of|the best way for the loan officer to reach the caller is)\s+/i,
            ""
          )
          .replace(/\s+/g, " ")
          .trim();
        if (next === v) break;
        v = next;
      }
      if (v) v = v.charAt(0).toUpperCase() + v.slice(1);
      return v.replace(/\.\s*$/, "").trim() || v;
    }

    function polishFieldText(key, text) {
      if (!text) return text;
      if (key === "zip") {
        const m = text.match(/\b(\d{5})\b/);
        if (m) return m[1];
      }
      if (key === "property_status") {
        text = text.replace(/^considering a /i, "").replace(/\s+for purchase\.?$/i, "");
      }
      if (key === "consent") {
        text = text.replace(/^consent to be contacted by .+ regarding /i, "Agreed — ");
      }
      return text.trim();
    }

    function isValidInsightKey(key) {
      if (!key || key === "zip_status") return false;
      if (key.includes("|") || key.length > 40) return false;
      return true;
    }

    function isPlaceholderValue(value) {
      return /^(?:not[\s_]?provided|not[\s_]?discussed|not[\s_]?disclosed|unknown|n\/a|na|none|declined|not_provided|unspecified)$/i.test(
        String(value || "").trim()
      );
    }

    function hasFieldValue(insight) {
      const v = formatInsightValue(insight && insight.value);
      return !!(v && !isPlaceholderValue(v));
    }

    function isDisplayableInsight(insight) {
      if (!insight || !isValidInsightKey(insight.key)) return false;
      const label = String(insight.label || "");
      if (label.includes("|")) return false;
      if (insight.key === "other" && formatInsightValue(insight.value).length > 180) return false;
      return hasFieldValue(insight);
    }

    function formatInsightLabel(item) {
      if (item && item.label) return item.label;
      const key = (item && item.key) || "";
      if (INSIGHT_KEY_LABELS[key]) return INSIGHT_KEY_LABELS[key];
      return key.replace(/_/g, " ").replace(/\b\w/g, (c) => c.toUpperCase()) || "Detail";
    }

    function confidenceTier(conf) {
      if (conf == null || Number.isNaN(Number(conf))) return "none";
      const c = Number(conf);
      if (c >= 0.9) return "high";
      if (c >= 0.65) return "mid";
      if (c >= 0.4) return "low";
      return "low";
    }

    function effectiveConfidence(rawValue, displayText, confidence) {
      const probe = ((rawValue || "") + " " + (displayText || "")).toLowerCase();
      let c =
        confidence != null && !Number.isNaN(Number(confidence))
          ? Number(confidence)
          : null;
      const hedged =
        /\b(?:approx(?:imately)?|around|roughly|about|maybe|probably|somewhat|i think|i guess|or so|give or take|between)\b/i.test(
          probe
        ) || /\b\d+\s*(?:to|-)\s*\d+\b/i.test(probe);
      if (c == null) return hedged ? 0.72 : null;
      if (hedged) return Math.min(c, 0.75);
      return c;
    }

    function fmtConfidence(conf) {
      if (conf == null || Number.isNaN(Number(conf))) return "—";
      return fmtDecimal(Number(conf) * 100, FMT_DECIMALS) + "%";
    }

    function insightMapFromRows(rows) {
      const map = {};
      for (const row of rows || []) {
        if (row && row.key) map[row.key] = row;
      }
      return map;
    }

    function countCapturedFields(map) {
      let n = 0;
      for (const row of Object.values(map || {})) {
        if (isDisplayableInsight(row)) n += 1;
      }
      return n;
    }

    function hasAnyConfidence(map) {
      return Object.values(map || {}).some(
        (row) => row && row.confidence != null && !Number.isNaN(Number(row.confidence))
      );
    }

    function displayFieldValue(fieldDef, insight, map) {
      let text = polishFieldText(fieldDef.key, formatInsightValue(insight.value));
      const confidence = effectiveConfidence(insight.value, text, insight.confidence);
      const hasConf = confidence != null && !Number.isNaN(Number(confidence));
      if (fieldDef.key === "zip") {
        const status = map.zip_status ? stripCallerPrefix(map.zip_status.value) : "";
        if (
          status &&
          /unverified|invalid|unknown/i.test(status) &&
          !text.toLowerCase().includes("unverified")
        ) {
          text += " — unverified";
        } else if (confidence != null && Number(confidence) < 0.5 && !text.toLowerCase().includes("unverified")) {
          text += " — unverified";
        }
      }
      return { text, tier: hasConf ? confidenceTier(confidence) : "captured", confidence, showBar: hasConf };
    }

    function renderKdFieldHtml(fieldDef, map) {
      const insight = map[fieldDef.key];
      const display = displayFieldValue(fieldDef, insight, map);
      const label = insight ? formatInsightLabel(insight) : formatInsightLabel(fieldDef);
      const icon = FIELD_ICON_SVG[fieldDef.icon] || FIELD_ICON_SVG.doc;
      const valueClass = display.tier === "none" ? "muted" : display.tier;
      const barPct =
        display.confidence != null
          ? Math.max(0, Math.min(100, Number(display.confidence) * 100))
          : 0;
      const barHtml = display.showBar
        ? `<div class="kd-bar-row">
          <div class="kd-bar-track">
            <div class="kd-bar-fill ${display.tier}" style="width:${barPct}%"></div>
          </div>
          <span class="kd-bar-pct">${escapeHtml(fmtConfidence(display.confidence))}</span>
        </div>`
        : "";
      return `<div class="kd-field">
        <div class="kd-field-head">
          ${icon}
          <span class="kd-field-label">${escapeHtml(label)}</span>
        </div>
        <div class="kd-field-value ${valueClass}">${escapeHtml(display.text)}</div>
        ${barHtml}
      </div>`;
    }

    function renderKdLegendHtml() {
      return `<div class="kd-legend">
        <span class="kd-legend-item"><span class="kd-legend-dot high"></span>90–100% stated clearly</span>
        <span class="kd-legend-item"><span class="kd-legend-dot mid"></span>65–80% approximate</span>
        <span class="kd-legend-item"><span class="kd-legend-dot low"></span>40–60% vague</span>
        <span class="kd-legend-item"><span class="kd-legend-dot none"></span>Not captured</span>
      </div>`;
    }

    function renderKeyDetailsFormHtml(map, rows) {
      const displayRows = (rows || []).filter(isDisplayableInsight);
      if (!displayRows.length) return "";

      let html = '<div class="kd-form"><div class="kd-grid">';
      for (const insight of displayRows) {
        html += renderKdFieldHtml(
          { key: insight.key, icon: iconForKey(insight.key, insight.label) },
          map
        );
      }
      html += "</div></div>";
      return html;
    }

    function renderKeyDetails(keyDetails, summary) {
      const rows = keyDetails || [];
      const map = insightMapFromRows(rows);
      const captured = countCapturedFields(map);
      let scrollHtml = "";

      if (captured > 0) {
        scrollHtml += `<div class="kd-meta-row">
          <span class="fields-status-dot"></span>
          <span>Captured</span>
          <span class="fields-capture-badge">${captured} captured</span>
        </div>`;
        scrollHtml += renderKeyDetailsFormHtml(map, rows);
      } else {
        scrollHtml += '<div class="empty-state" style="margin:0;padding:0.5rem 0">No key details captured for this call.</div>';
      }

      if (summary) {
        scrollHtml += `<div class="summary-block"><h4>Call summary</h4>`;
        for (const para of String(summary).split(/\n+/).filter(Boolean)) {
          scrollHtml += `<p>${escapeHtml(para)}</p>`;
        }
        scrollHtml += `</div>`;
      }

      const legendHtml = captured > 0 && hasAnyConfidence(map) ? renderKdLegendHtml() : "";
      return `<div class="kd-panel-scroll">${scrollHtml}</div>${
        legendHtml ? `<div class="kd-panel-legend">${legendHtml}</div>` : ""
      }`;
    }

    function getCostBreakdown(call) {
      const bd = call && call.costBreakdown && typeof call.costBreakdown === "object"
        ? call.costBreakdown
        : {};
      const voice = Number(bd.voiceUsd) || 0;
      const transcribe = Number(bd.transcribeUsd) || 0;
      const extract = Number(bd.extractUsd) || 0;
      const summary = Number(bd.summaryUsd) || 0;
      const tts = Number(bd.ttsUsd) || 0;
      let total = Number(bd.totalUsd);
      if (!total || Number.isNaN(total)) {
        total = Number(call && call.callCostUsd);
      }
      if (!total || Number.isNaN(total)) {
        total = voice + transcribe + extract + summary + tts;
      }
      return { voice, transcribe, extract, summary, tts, total };
    }

    function renderCostBreakdown(call) {
      const { voice, transcribe, extract, summary, tts, total } = getCostBreakdown(call);
      if (!(total > 0 || voice > 0 || transcribe > 0 || extract > 0 || summary > 0 || tts > 0)) {
        return '<div class="empty-state" style="margin:0;padding:0.5rem 0">No cost data saved for this call.</div>';
      }
      return `<div class="cost-breakdown">
        <div class="cost-breakdown-items">
          <div class="cost-breakdown-row">
            <span class="label">Voice (agent responses)</span>
            <span class="value">${escapeHtml(fmtCostUsd(voice > 0 ? voice : null))}</span>
          </div>
          <div class="cost-breakdown-row">
            <span class="label">Transcription (STT)</span>
            <span class="value">${escapeHtml(fmtCostUsd(transcribe > 0 ? transcribe : null))}</span>
          </div>
          <div class="cost-breakdown-row">
            <span class="label">Speech synthesis (TTS)</span>
            <span class="value">${escapeHtml(fmtCostUsd(tts > 0 ? tts : null))}</span>
          </div>
          <div class="cost-breakdown-row">
            <span class="label">Key details (extraction)</span>
            <span class="value">${escapeHtml(fmtCostUsd(extract > 0 ? extract : null))}</span>
          </div>
          <div class="cost-breakdown-row">
            <span class="label">Call summary</span>
            <span class="value">${escapeHtml(fmtCostUsd(summary > 0 ? summary : null))}</span>
          </div>
        </div>
        <div class="cost-breakdown-summary">
          <span class="cost-total-label">Total estimated cost</span>
          <span class="cost-total-value">${escapeHtml(fmtCostUsd(total > 0 ? total : null))}</span>
          <p class="cost-breakdown-note">Estimated from token usage × configured Azure rates (Voice Live model + transcribe STT + per-character speech synthesis). Actual billing may differ slightly.</p>
        </div>
      </div>`;
    }

    function metricsAvgLabel(metrics, call) {
      const measured = (metrics || []).length;
      const { messages, agentResponses } = callStats(call);
      if (agentResponses != null && messages != null && messages > agentResponses) {
        return `avg · ${agentResponses} agent response${agentResponses === 1 ? "" : "s"} · ${messages} transcript message${messages === 1 ? "" : "s"}`;
      }
      return `avg · ${measured} agent response${measured === 1 ? "" : "s"}`;
    }

    function renderMetricsCards(metrics, call) {
      if (!metrics || !metrics.length) {
        return '<div class="empty-state" style="margin:0;padding:0.5rem 0">No metrics saved.</div>';
      }
      const turnLabel = metricsAvgLabel(metrics, call);
      const tokenTotals = sumMetricTokens(metrics);
      const cards = [
        ["Time to first audio", avgDerived(metrics, deriveFirstAudioMs)],
        ["Speech → Text", avgMetric(metrics, "sttMs")],
        ["Thinking", avgMetric(metrics, "thinkMs")],
        ["Text → Speech", avgMetric(metrics, "ttsMs")],
        ["End-to-end response time", avgDerived(metrics, deriveE2eResponseMs)],
        ["Output tokens", avgOutputTokens(metrics)],
        ["Tokens / sec", avgTokensPerSec(metrics)],
      ];
      let html = cards
        .map(([label, val]) => {
          const display =
            label === "Output tokens"
              ? val != null ? fmtDecimal(val, FMT_DECIMALS) : "—"
              : label === "Tokens / sec"
                ? val != null ? fmtDecimal(val, FMT_DECIMALS) : "—"
                : fmtMs(val);
          return `<div class="metric-card">
            <div class="metric-label">${escapeHtml(label)}</div>
            <div class="metric-value">${escapeHtml(String(display))}</div>
            <div class="metric-sub">${escapeHtml(turnLabel)}</div>
          </div>`;
        })
        .join("");
      return html;
    }

    function renderMetricsTable(metrics, call) {
      if (!metrics || !metrics.length) {
        return { body: '<tr><td colspan="13" class="muted" style="text-align:center">No turn metrics.</td></tr>', foot: "" };
      }
      const body = metrics
        .map((row) => {
          const m = row.metrics || {};
          const tk = row.tokens || {};
          const tokens = `${tk.input != null ? tk.input : "—"} / ${tk.output != null ? tk.output : "—"}`;
          const extractCost = rowExtractCostUsd(row);
          const cells = [
            row.seq != null ? row.seq : row.turn,
            fmtMs(m.sttMs),
            fmtMs(m.thinkMs),
            fmtMs(m.ttsStartMs != null ? m.ttsStartMs : m.ttfaMs),
            fmtMs(deriveFirstAudioMs(m)),
            fmtMs(m.ttsMs),
            fmtMs(deriveE2eResponseMs(m)),
            fmtMs(m.turnMs),
            tokens,
            rowVoiceCostUsd(row) > 0 ? fmtCostUsd(rowVoiceCostUsd(row)) : "—",
            rowTtsCostUsd(row) > 0 ? fmtCostUsd(rowTtsCostUsd(row)) : "—",
            extractCost > 0 ? fmtCostUsd(extractCost) : "—",
            rowTurnCostUsd(row) != null ? fmtCostUsd(rowTurnCostUsd(row)) : "—",
          ];
          return `<tr><td>${cells.map((c) => escapeHtml(String(c))).join("</td><td>")}</td></tr>`;
        })
        .join("");
      const tokenTotals = sumMetricTokens(metrics);
      const voiceSum = metrics.reduce((sum, row) => sum + rowVoiceCostUsd(row), 0);
      const ttsSum = metrics.reduce((sum, row) => sum + rowTtsCostUsd(row), 0);
      const extractSum = metrics.reduce((sum, row) => sum + rowExtractCostUsd(row), 0);
      const foot = `<tr>
        <td colspan="8" style="text-align:right;font-weight:600">Subtotals (agent rows)</td>
        <td>${escapeHtml(tokenTotals.input + " / " + tokenTotals.output)}</td>
        <td class="cost-cell">${escapeHtml(fmtCostUsd(voiceSum > 0 ? voiceSum : null))}</td>
        <td class="cost-cell">${escapeHtml(fmtCostUsd(ttsSum > 0 ? ttsSum : null))}</td>
        <td class="cost-cell">${escapeHtml(fmtCostUsd(extractSum > 0 ? extractSum : null))}</td>
        <td class="cost-cell">${escapeHtml(fmtCostUsd(voiceSum + ttsSum + extractSum > 0 ? voiceSum + ttsSum + extractSum : null))}</td>
      </tr>`;
      return { body, foot };
    }

    function renderEventsTable(events) {
      if (!events || !events.length) {
        return '<tr><td colspan="4" style="text-align:center;color:var(--text-muted)">No events saved.</td></tr>';
      }
      return insertTimelineGapRows(events)
        .map((ev) => {
          if (ev.synthetic && ev.event === "gap") {
            return `<tr class="timeline-gap">
              <td colspan="4">${escapeHtml(describeTimelineGap(ev.gapMs))}</td>
            </tr>`;
          }
          const extra = { ...ev };
          delete extra.event;
          delete extra.turn;
          delete extra.atMs;
          delete extra.synthetic;
          const extraStr = Object.keys(extra).length ? JSON.stringify(extra) : "";
          const bookend =
            ev.event === "call_started" || ev.event === "call_ended"
              ? " timeline-bookend"
              : "";
          const wrap = WRAP_UP_EVENTS.has(ev.event) ? " timeline-wrap" : "";
          const turnDisplay = ev.turn != null && ev.turn !== "" ? String(ev.turn) : "—";
          return `<tr class="${(bookend + wrap).trim()}">
            <td>${escapeHtml(timelineEventLabel(ev.event))}</td>
            <td>${escapeHtml(turnDisplay)}</td>
            <td>${escapeHtml(ev.atMs != null ? fmtTimelineAt(ev.atMs) : "—")}</td>
            <td style="white-space:normal;max-width:320px">${escapeHtml(extraStr)}</td>
          </tr>`;
        })
        .join("");
    }

    function toggleSection(id) {
      const body = document.getElementById(id);
      if (!body) return;
      body.classList.toggle("collapsed");
    }

    async function loadCallDetail(callId, { pushState = true } = {}) {
      if (!callId) return;
      selectedCallId = callId;

      document.querySelectorAll(".call-list-item").forEach((el) => {
        el.classList.toggle("selected", el.dataset.callId === callId);
      });

      const detailEl = document.getElementById("callDetail");
      detailEl.innerHTML = loadingPanel("Loading call details…", "detail");

      if (pushState) {
        const url = new URL(window.location.href);
        url.searchParams.set("id", callId);
        history.replaceState({ callId }, "", url);
      }

      try {
        const res = await fetch(`/api/calls/${encodeURIComponent(callId)}`, {
          credentials: "same-origin",
        });
        if (res.status === 401) {
          window.location.replace("/login");
          return;
        }
        if (res.status === 404) {
          detailEl.innerHTML = '<div class="error-state">Call not found.</div>';
          return;
        }
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          detailEl.innerHTML = `<div class="error-state">${escapeHtml(err.error || "Failed to load call.")}</div>`;
          return;
        }

        const call = await res.json();
        const stats = callStats(call);
        const metricsTable = renderMetricsTable(call.metrics, call);
        const { total: sessionCost } = getCostBreakdown(call);
        detailEl.innerHTML = `
          <dl class="detail-meta">
            <div><dt>Call ID</dt><dd>${escapeHtml(call.callId || call.id || "—")}</dd></div>
            <div><dt>Started</dt><dd>${escapeHtml(fmtDate(call.startedAt))}</dd></div>
            <div><dt>Ended</dt><dd>${escapeHtml(fmtDate(call.endedAt))}</dd></div>
            <div><dt>Duration</dt><dd>${escapeHtml(fmtDuration(call.durationSec))}</dd></div>
            <div><dt>User turns</dt><dd>${escapeHtml(stats.userTurns != null ? stats.userTurns : "—")}</dd></div>
            <div><dt>Transcript messages</dt><dd>${escapeHtml(stats.messages != null ? stats.messages : "—")}</dd></div>
            <div><dt>Agent responses</dt><dd>${escapeHtml(stats.agentResponses != null ? stats.agentResponses : "—")}</dd></div>
            <div><dt>Total est. cost</dt><dd>${escapeHtml(fmtCostUsd(sessionCost > 0 ? sessionCost : null))}</dd></div>
            <div><dt>Channel</dt><dd>${escapeHtml(call.channel || "—")}</dd></div>
            <div><dt>Voice model</dt><dd>${escapeHtml(call.model || "—")}</dd></div>
            <div><dt>Brokerage</dt><dd>${escapeHtml(call.brokerage || "—")}</dd></div>
            <div><dt>Persona</dt><dd>${escapeHtml(call.persona || "—")}</dd></div>
          </dl>

          <div class="detail-grid">
            <section class="panel">
              <div class="panel-header">Transcript</div>
              <div class="panel-body transcript-log">${renderTranscript(call.transcript)}</div>
            </section>
            <section class="panel panel-key-details">
              <div class="panel-header">Key details</div>
              <div class="panel-body">${renderKeyDetails(call.keyDetails, call.callSummary)}</div>
            </section>
            <section class="panel">
              <div class="panel-header">Performance Metrics <span style="font-weight:500;font-size:0.72rem;color:var(--text-muted)">· session averages</span></div>
              <div class="panel-body">${renderMetricsCards(call.metrics, call)}</div>
            </section>
          </div>

          <section class="section-panel">
            <div class="panel-header">Estimated Call Cost</div>
            <div class="panel-body">${renderCostBreakdown(call)}</div>
          </section>

          <section class="section-panel">
            <div class="panel-header" onclick="toggleSection('metricsBody')">
              <span>Per-response Metrics</span><span>▼</span>
            </div>
            <div class="panel-body turn-table-wrap" id="metricsBody">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>#</th><th>STT</th><th>Think</th><th>TTS&nbsp;start</th><th>To&nbsp;first&nbsp;audio</th><th>TTS</th>
                    <th>E2E&nbsp;response</th><th>Total</th><th>Tokens (in/out)</th>
                    <th>Voice</th><th>TTS&nbsp;$</th><th>Key&nbsp;details</th><th>Turn&nbsp;total</th>
                  </tr>
                </thead>
                <tbody>${metricsTable.body}</tbody>
                ${metricsTable.foot ? `<tfoot>${metricsTable.foot}</tfoot>` : ""}
              </table>
              <p class="metrics-cost-note">Per-row costs cover voice and key-details extraction only. See Estimated Call Cost above for transcription (STT) and summary.</p>
            </div>
          </section>

          <section class="section-panel">
            <div class="panel-header" onclick="toggleSection('eventsBody')">
              <span>Event Timeline</span><span>▼</span>
            </div>
            <div class="panel-body events-table-wrap" id="eventsBody">
              <table class="data-table">
                <thead><tr><th>Event</th><th>User turn</th><th>Call elapsed</th><th>Details</th></tr></thead>
                <tbody>${renderEventsTable(call.events)}</tbody>
              </table>
              <p class="timeline-note">${escapeHtml(timelineNote(call, call.events))}</p>
            </div>
          </section>
        `;
      } catch (err) {
        detailEl.innerHTML = `<div class="error-state">Failed to load call: ${escapeHtml(err.message)}</div>`;
      }
    }

    window.toggleSection = toggleSection;

    (async function init() {
      applySavedTheme();
      if (!(await ensureAuthenticated())) return;
      sessionCheckTimer = setInterval(ensureAuthenticated, 60000);
      await loadCallList();
    })();
  </script>
</body>
</html>
